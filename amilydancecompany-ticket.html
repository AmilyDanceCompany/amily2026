<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>電子チケット — Amily Summer Showcase 2026</title>
<link rel="icon" href="amily-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@300;400&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f9f7f4;--ink:#1a1a1a;--mid:#666;--border:#e0ddd8;
  --rose:#c0435a;--gold:#b88a20;
  --green:#2d7a4f;--warn:#b86a00;--warn-l:#fff8ee;
}
body{background:var(--bg);font-family:'Noto Sans JP',sans-serif;color:var(--ink);min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;padding:24px 16px 48px;}

.hdr{text-align:center;margin-bottom:28px;}
.hdr-brand{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--mid);margin-bottom:6px;}
.hdr-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}

.login-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:28px 24px;}
.login-h{font-size:15px;font-weight:700;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--mid);margin-bottom:20px;line-height:1.7;}
.field-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;transition:border .15s;}
.field-input:focus{border-color:var(--rose);}
.btn-primary{width:100%;margin-top:12px;padding:13px;background:var(--rose);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-primary:disabled{opacity:.5;cursor:default;}
.err-msg{margin-top:12px;font-size:12px;color:var(--rose);text-align:center;display:none;}

.ticket-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px;}

/* フリップ（表＝紙デザイン／裏＝座席・QR） */
.flip-card{position:relative;perspective:1300px;margin-bottom:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.flip-inner{position:relative;width:100%;aspect-ratio:1/1.4;transition:transform .55s cubic-bezier(.4,.15,.2,1);transform-style:preserve-3d;}
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-front,.flip-back{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;border-radius:16px;overflow:hidden;box-shadow:0 5px 18px rgba(0,0,0,.18);}
.flip-front{display:flex;align-items:center;justify-content:center;}
.ff-img{width:84%;height:84%;object-fit:contain;display:block;}
.ff-overlay{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.62));padding:26px 16px 12px;color:#fff;text-align:center;}
.ffo-seat{font-size:23px;font-weight:800;letter-spacing:.02em;}
.ffo-no{font-family:'DM Mono',monospace;font-size:11px;opacity:.8;margin-top:3px;letter-spacing:.1em;}
.flip-hint{position:absolute;top:10px;right:10px;z-index:2;font-size:11px;font-weight:700;color:#fff;background:rgba(0,0,0,.4);padding:5px 12px;border-radius:20px;}
.flip-back{transform:rotateY(180deg);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px 16px;gap:6px;}
.fb-fig{position:absolute;left:50%;top:13%;transform:translateX(-50%);width:78%;opacity:.18;pointer-events:none;z-index:0;}
.flip-back > *:not(.fb-fig){position:relative;z-index:1;}
.fb-event{font-family:'Playfair Display',serif;font-size:14px;opacity:.9;}
.fb-seat{font-size:27px;font-weight:800;margin-top:2px;line-height:1.15;}
.fb-no{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.14em;opacity:.8;}
.fb-perf{font-size:14px;font-weight:700;opacity:.95;margin-top:4px;}
.fb-venue{font-size:10px;opacity:.8;line-height:1.7;margin-top:2px;}
.fb-qr{background:#fff;padding:8px;border-radius:10px;margin-top:8px;line-height:0;}
.fb-qrnote{font-size:9.5px;opacity:.85;margin-top:6px;}
.fb-msg{font-size:12px;line-height:1.8;background:rgba(255,255,255,.14);border-radius:10px;padding:14px 16px;margin-top:6px;}
.fb-checked{display:inline-block;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;margin-top:6px;}
.tc-head{background:#6b2340;color:#fff;padding:14px 18px;position:relative;overflow:hidden;}
.tc-head-wm{position:absolute;right:-10px;top:50%;transform:translateY(-50%);width:80px;height:80px;object-fit:contain;opacity:.22;pointer-events:none;mix-blend-mode:screen;}
.tc-head-text{position:relative;}
.tc-brand{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;opacity:.6;margin-bottom:2px;}
.tc-event{font-family:'Playfair Display',serif;font-size:15px;}
.tc-body{padding:16px 18px 12px;}
.tc-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;}
.tc-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--mid);min-width:60px;letter-spacing:.05em;flex-shrink:0;}
.tc-val{font-size:13px;font-weight:700;}
.tc-no{font-family:'DM Mono',monospace;font-size:22px;color:var(--gold);letter-spacing:.12em;}
.checked-badge{display:inline-block;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle;}

.alert-box{margin:0 18px 14px;background:var(--warn-l);border:1.5px solid var(--warn);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--warn);line-height:1.7;}

.event-detail{padding:12px 18px 14px;border-top:1px dashed var(--border);font-size:11px;color:var(--mid);line-height:1.9;}

.qr-wrap{text-align:center;padding:16px 18px 20px;border-top:1px dashed var(--border);display:flex;flex-direction:column;align-items:center;}
.qr-note{font-size:10px;color:var(--mid);margin-top:8px;}
.qr-subnote{display:inline-block;margin-top:4px;font-size:9px;color:var(--mid);opacity:.85;}

.unpaid-box{text-align:center;padding:20px 18px;border-top:1px dashed var(--border);color:var(--mid);}
.unpaid-icon{font-size:32px;margin-bottom:8px;}
.unpaid-txt{font-size:12px;line-height:1.7;}
.reg-box{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
.reg-input{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:10px 12px;font-size:14px;color:#1a1a1a;outline:none;text-align:center;}
.reg-input:focus{border-color:#8C2D3F;}
.reg-btn{width:100%;background:#8C2D3F;color:#fff;border:none;padding:11px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;}
.reg-btn:disabled{opacity:.6;cursor:default;}
.reg-msg{font-size:11px;line-height:1.6;margin-top:2px;}

.loading{text-align:center;padding:60px 0;color:var(--mid);font-size:13px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--rose);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

.page-lbl{font-size:12px;color:var(--mid);margin-bottom:14px;letter-spacing:.05em;}
.btn-logout{width:100%;padding:11px;background:none;border:1.5px solid var(--border);border-radius:10px;font-size:13px;color:var(--mid);cursor:pointer;font-family:inherit;margin-top:4px;}

.seatmap-box{border-top:1px dashed var(--border);padding:14px 18px 16px;}
.seatmap-lbl{font-size:10px;color:var(--mid);margin-bottom:8px;text-align:center;letter-spacing:.1em;}
.seatmap-wrap{overflow:hidden;border-radius:4px;background:#f9f7f4;touch-action:none;cursor:grab;height:150px;position:relative;}
.seatmap-hint{font-size:10px;color:#ccc;text-align:center;margin-top:6px;}
.seatmap-legend{display:flex;gap:10px;margin-top:8px;font-size:10px;color:var(--mid);justify-content:center;flex-wrap:wrap;}
.seatmap-legend span{display:flex;align-items:center;gap:4px;}
.seatmap-legend i{width:9px;height:9px;border-radius:1px;display:inline-block;flex-shrink:0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-brand">AMILY SUMMER SHOWCASE 2026</div>
    <div class="hdr-title">電子チケット</div>
  </div>

  <div id="view-loading" class="loading" style="display:none;">
    <div class="spinner"></div>読み込み中...
  </div>

  <!-- ログイン -->
  <div id="view-login">
    <div class="login-card">
      <div class="login-h">メールアドレスでログイン</div>
      <div class="login-sub">申し込み時に登録したメールアドレスを入力してください。</div>
      <input class="field-input" id="email-input" type="email" placeholder="example@email.com" autocomplete="email">
      <button class="btn-primary" id="login-btn" onclick="loginByEmail()">チケットを確認する</button>
      <div class="err-msg" id="login-err"></div>
    </div>
  </div>

  <!-- チケット表示 -->
  <div id="view-tickets" style="display:none;">
    <div class="page-lbl" id="page-lbl"></div>
    <div id="ticket-list"></div>
    <button class="btn-logout" id="btn-logout" onclick="logout()" style="display:none;">ログアウト</button>
  </div>
</div>

const FIG_IMG = { '1st': FIG_SRC, '2nd': FIG_SRC };

const GAS_URL        = 'https://script.google.com/macros/s/AKfycbyFHFu1S9FpTu2nS4iFmjn2zZ1_33c1D_1SNj4UXkHbRxWMj38dly_vR7qvhEaVpC6Eow/exec';
const TICKET_BASE    = location.origin + location.pathname;
const params         = new URLSearchParams(location.search);
const directId       = params.get('id');
let   loggedInEmail  = '';  // メールログイン時のアドレス（番号登録に使用）

window.addEventListener('DOMContentLoaded', () => {
  if (directId) {
    showLoading();
    fetch(`${GAS_URL}?action=getTicketByNo&id=${encodeURIComponent(directId)}`)
      .then(r => r.json())
      .then(res => {
        hideLoading();
        if (res.status !== 'ok') { showErr('チケットが見つかりません。'); return; }
        showTickets([res.ticket], false);
      })
      .catch(() => { hideLoading(); showErr('通信エラーが発生しました。'); });
  }
});

function loginByEmail() {
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  if (!email) { showErr('メールアドレスを入力してください。'); return; }
  loggedInEmail = email;
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  showLoading();
  fetch(`${GAS_URL}?action=getTicketsByEmail&email=${encodeURIComponent(email)}`)
    .then(r => r.json())
    .then(res => {
      hideLoading();
      btn.disabled = false;
      if (res.status !== 'ok') { showErr(res.message || 'チケットが見つかりません。'); return; }
      showTickets(res.tickets, true);
    })
    .catch(() => { hideLoading(); btn.disabled = false; showErr('通信エラーが発生しました。'); });
}

function showTickets(tickets, showLogout) {
  document.getElementById('view-login').style.display   = 'none';
  document.getElementById('view-tickets').style.display = 'block';
  document.getElementById('btn-logout').style.display   = showLogout ? 'block' : 'none';
  document.getElementById('page-lbl').textContent       = showLogout ? `チケット ${tickets.length}件` : 'チケット情報';
  const list = document.getElementById('ticket-list');
  list.innerHTML = '';
  tickets.forEach(t => list.appendChild(buildCard(t)));
}

function logout() {
  document.getElementById('view-tickets').style.display = 'none';
  document.getElementById('view-login').style.display   = 'block';
  document.getElementById('email-input').value = '';
  document.getElementById('login-err').style.display = 'none';
}

function showErr(msg) {
  hideLoading();
  document.getElementById('view-login').style.display = 'block';
  const el = document.getElementById('login-err');
  el.textContent  = msg;
  el.style.display = 'block';
}

function showLoading() {
  document.getElementById('view-login').style.display    = 'none';
  document.getElementById('view-tickets').style.display  = 'none';
  document.getElementById('view-loading').style.display  = 'block';
}
function hideLoading() {
  document.getElementById('view-loading').style.display = 'none';
}

// 自由席チケット番号を登録（差額変更の番号未登録カードから）
function registerFreeTicket(ref, inp, btn, msg) {
  const val = (inp.value || '').trim();
  msg.style.display = 'none';
  if (!val) { showRegMsg(msg, '自由席チケット番号を入力してください。', false); return; }
  if (!loggedInEmail) { showRegMsg(msg, 'お手数ですが、再度メールアドレスでログインしてください。', false); return; }

  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '登録中…';

  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'linkFreeTicket', ref, email: loggedInEmail, freeTicket: val }),
  })
    .then(r => r.json())
    .then(res => {
      if (res.status === 'ok') {
        showRegMsg(msg, '登録が完了しました。最新の状態を読み込みます…', true);
        // 一覧を再取得して表示を更新
        setTimeout(() => reloadByEmail(), 800);
      } else {
        btn.disabled = false; btn.textContent = orig;
        showRegMsg(msg, res.message || '登録に失敗しました。番号をご確認ください。', false);
      }
    })
    .catch(() => {
      btn.disabled = false; btn.textContent = orig;
      showRegMsg(msg, '通信エラーが発生しました。再度お試しください。', false);
    });
}

function showRegMsg(el, text, ok) {
  el.textContent = text;
  el.style.color = ok ? '#2e7d4f' : '#c0392b';
  el.style.display = 'block';
}

// メールアドレスで一覧を再取得（登録後の更新用）
function reloadByEmail() {
  if (!loggedInEmail) return;
  showLoading();
  fetch(`${GAS_URL}?action=getTicketsByEmail&email=${encodeURIComponent(loggedInEmail)}`)
    .then(r => r.json())
    .then(res => {
      hideLoading();
      if (res.status !== 'ok') { showErr(res.message || 'チケットが見つかりません。'); return; }
      showTickets(res.tickets, true);
    })
    .catch(() => { hideLoading(); showErr('通信エラーが発生しました。'); });
}

function buildCard(t) {
  const noStr     = t.needsTicketNo ? '—' : String(t.ticketNo || t.ticketNoStr || '').replace(/^0+/, '');
  const perfLabel = t.perf === '1st' ? '1st Stage　14:30開演（開場 14:00）' : '2nd Stage　18:00開演（開場 17:30）';
  const isPaid      = t.paid || t.payment === '支払済';
  const isChecked   = t.checkin === '入場済';
  const isFree      = !t.seatType || t.seatType === '自由席';
  const isInvite    = /招待/.test(String(t.seatType || '')); // 招待席（H列）＝無料・常にQR表示
  const isPerformer = t.handling && t.handling !== '一般';
  const needsReg    = !!t.needsTicketNo;  // 差額変更で自由席チケット番号が未登録
  let showQR;
  if (needsReg) {
    // 番号未登録 → QR非表示（未入金と同様）
    showQR = false;
  } else if (isInvite) {
    // 招待席：支払い不要 → 最初からQR表示
    showQR = true;
  } else if (!isFree) {
    // 指定席：紙QR・メールログインともに支払済のみ表示
    showQR = isPaid;
  } else if (isPerformer) {
    // 出演者・自由席：常に表示
    showQR = true;
  } else {
    // 一般・自由席：紙QRは常に表示、メールログインは入金状況に従う
    showQR = !!directId || isPaid;
  }

  const card = document.createElement('div');
  card.style.marginBottom = '18px';

  const headColor = t.perf === '2nd' ? '#4C4A8B' : '#672C4D'; // DIC-F58 / DIC-F70
  const frontImg  = LOGO_IMG[t.perf === '2nd' ? '2nd' : '1st'];

  // 座席コード抽出（形式に依存せず）
  const sc = String(t.seatType || '').match(/([A-O])\s*-?\s*0*(\d+)/i);
  const seatDisp  = sc ? `${sc[1].toUpperCase()}${parseInt(sc[2],10)}` : t.seatType;
  const seatLabel = needsReg ? '指定席（番号登録待ち）' : (isFree ? '自由席' : (isInvite ? `招待席 ${seatDisp}` : `指定席 ${seatDisp}`));

  const qrId = `qr-${noStr}-${Math.random().toString(36).slice(2)}`;
  const backMain = showQR
    ? `<div class="fb-qr" id="${qrId}"></div><div class="fb-qrnote">入場時にこのQRコードをご提示ください</div>`
    : needsReg
    ? `<div class="fb-msg">🎫 自由席チケット番号の登録が必要です。<br>下の入力欄からご登録ください。</div>`
    : `<div class="fb-msg">🔒 お支払い確認後にQRコードが表示されます。</div>`;

  // フリップカード（表＝紙デザイン／裏＝座席・QR）
  const flip = document.createElement('div');
  flip.className = 'flip-card flipped'; // 既定はQR面（裏）を表示。タップでデザイン面へ
  flip.innerHTML = `
    <div class="flip-inner">
      <div class="flip-front" style="background:${headColor};">
        <img class="ff-img" src="${frontImg}" alt="Amily Summer Showcase 2026">
        <div class="ff-overlay">
          <div class="ffo-seat">${seatLabel}</div>
          <div class="ffo-no">NO. ${noStr}${isChecked ? ' ・入場済み' : ''}</div>
        </div>
      </div>
      <div class="flip-back" style="background:${headColor};">
        <img class="fb-fig" src="${FIG_IMG[t.perf === '2nd' ? '2nd' : '1st']}" alt="">
        <div class="fb-event">Amily Summer Showcase 2026</div>
        <div class="fb-seat">${seatLabel}</div>
        <div class="fb-no">NO. ${noStr}</div>
        <div class="fb-perf">${perfLabel}</div>
        <div class="fb-venue">2026年8月14日（金）<br>川崎市民プラザ ふるさと劇場</div>
        ${backMain}
        ${isChecked ? '<div class="fb-checked">入場済み</div>' : ''}
      </div>
    </div>
    <div class="flip-hint" data-hint aria-label="表裏を切り替え">⇄</div>`;
  flip.addEventListener('click', () => flip.classList.toggle('flipped'));
  card.appendChild(flip);

  // 未払いアラート（QRスキャンアクセスで指定席+未払い）
  if (t.unpaidAlert) {
    const a = document.createElement('div'); a.className = 'ticket-card';
    a.innerHTML = `<div class="alert-box" style="margin:12px;">⚠ 指定席にアップグレード済みですが、お支払いがまだ確認できていません。<br>確認メールに記載の方法でお支払いをお済ませください。</div>`;
    card.appendChild(a);
  }

  // 番号登録が必要な場合の入力欄（フリップの下）
  if (needsReg) {
    const regId = `reg-${Math.random().toString(36).slice(2)}`;
    const rb = document.createElement('div'); rb.className = 'ticket-card';
    rb.innerHTML = `
      <div class="unpaid-box">
        <div class="unpaid-icon">🎫</div>
        <div class="unpaid-txt">お手持ちの<strong>自由席チケット番号の登録</strong>が必要です。<br>券面に記載の番号をご登録いただくと、お支払い確認後にQRコードが表示されます。</div>
        <div class="reg-box" id="${regId}">
          <input class="reg-input" type="text" inputmode="numeric" placeholder="例: 1050（複数席は 1050, 1051）">
          <button class="reg-btn" type="button">この番号で登録する</button>
          <div class="reg-msg" style="display:none;"></div>
        </div>
      </div>`;
    card.appendChild(rb);
    setTimeout(() => {
      const boxEl = document.getElementById(regId); if (!boxEl) return;
      const inp = boxEl.querySelector('.reg-input');
      const b   = boxEl.querySelector('.reg-btn');
      const msg = boxEl.querySelector('.reg-msg');
      b.addEventListener('click', () => registerFreeTicket(t.ref, inp, b, msg));
    }, 50);
  }

  // QRコード生成（裏面）
  if (showQR) {
    setTimeout(() => {
      const el = document.getElementById(qrId);
      if (el) new QRCode(el, {
        text: `${TICKET_BASE}?id=${noStr}`,
        width: 150, height: 150,
        colorDark: '#1a1a1a', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
      });
    }, 80);
  }

  // 座席図（指定席のみ・番号登録待ちは非表示）
  if (!isFree && !needsReg) {
    const mapId = `smap-${noStr}-${Math.random().toString(36).slice(2)}`;
    const mb = document.createElement('div'); mb.className = 'ticket-card';
    mb.innerHTML = `
      <div class="seatmap-box">
        <div class="seatmap-lbl">— 座席図 —</div>
        <div class="seatmap-wrap" id="${mapId}">
          <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;transform-origin:0 0;"></svg>
        </div>
        <div class="seatmap-legend">
          <span><i style="background:#dedad5;"></i>自由席</span>
          <span><i style="background:#3a8c5c;"></i>指定席</span>
          <span><i style="background:#8C2D3F;"></i>あなたの席</span>
        </div>
      </div>`;
    card.appendChild(mb);
    setTimeout(() => buildSeatMap(mapId, t.seatType), 100);
  }

  return card;
}

function buildSeatMap(wrapperId, seatType) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const svg = wrap.querySelector('svg');
  const ns = 'http://www.w3.org/2000/svg';

  // 「C18」「C-18」「指定席（C18）」など、どの形式でも 行(A-O)+列番号 を抽出
  const m = String(seatType || '').match(/([A-O])\s*-?\s*0*(\d+)/i);
  const TR = m ? m[1].toUpperCase() : '';
  const TC = m ? parseInt(m[2], 10) : 0;

  const ROWS = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O'];
  const ROW_CFG = {
    A:{left:[6,12],right:[25,31],sel:[13,14,15,16,21,22,23,24]},
    B:{left:[5,12],right:[25,32],sel:rng(13,24)},
    C:{left:[4,12],right:[25,33],sel:rng(13,24)},
    D:{left:[2,12],right:[25,35],sel:rng(13,24)},
    E:{left:[2,12],right:[25,35],sel:rng(13,24)},
    F:{left:[2,12],right:[25,35],sel:rng(13,24)},
    G:{left:[1,12],right:[25,36],sel:rng(13,24)},
    H:{left:[1,12],right:[25,36],sel:[]},
    I:{left:[1,12],right:[25,36],sel:rng(13,24)},
    J:{left:[1,12],right:[25,36],sel:rng(13,24)},
    K:{left:[1,12],right:[25,36],sel:rng(13,24)},
    L:{left:[1,12],right:[25,36],sel:[]},
    M:{left:[2,12],right:[25,35],sel:[]},
    N:{left:[3,12],right:[25,34],sel:[]},
    O:{left:null,right:[25,33],sel:[],wc:true}
  };
  const UNAVAIL = {A:[17,18,19,20],H:rng(13,24),M:rng(13,24),N:rng(13,24),O:rng(13,24)};
  function rng(a,b){const x=[];for(let i=a;i<=b;i++)x.push(i);return x;}

  const S=6,G=1.5,STEP=S+G,AISLE=10,HDR=8,AISLE_V=5;
  // D→E列間の横通路ぶん、E以降（行index>=4）を下へずらす
  function rowY(ri){ return HDR+STEP+ri*STEP + (ri>=4?AISLE_V:0); }
  function colToX(c){
    if(c>=1&&c<=12) return (c-1)*STEP;
    if(c>=13&&c<=24) return 12*STEP+AISLE+(c-13)*STEP;
    if(c>=25&&c<=36) return 12*STEP+AISLE+12*STEP+AISLE+(c-25)*STEP;
    return 0;
  }
  const totalW=12*STEP+AISLE+12*STEP+AISLE+12*STEP;
  const totalH=HDR+STEP+ROWS.length*STEP+AISLE_V;
  svg.setAttribute('viewBox',`0 0 ${totalW} ${totalH}`);
  svg.setAttribute('width',totalW);svg.setAttribute('height',totalH);

  const defs=document.createElementNS(ns,'defs');
  const pat=document.createElementNS(ns,'pattern');
  pat.setAttribute('id',`h-${wrapperId}`);pat.setAttribute('patternUnits','userSpaceOnUse');
  pat.setAttribute('width','4');pat.setAttribute('height','4');pat.setAttribute('patternTransform','rotate(45)');
  const ln=document.createElementNS(ns,'line');
  ln.setAttribute('x1','0');ln.setAttribute('y1','0');ln.setAttribute('x2','0');ln.setAttribute('y2','4');
  ln.setAttribute('stroke','rgba(0,0,0,0.22)');ln.setAttribute('stroke-width','2');
  pat.appendChild(ln);defs.appendChild(pat);svg.appendChild(defs);

  for(let c=13;c<=24;c++){
    const t2=document.createElementNS(ns,'text');
    t2.setAttribute('x',colToX(c)+S/2);t2.setAttribute('y',HDR-1);
    t2.setAttribute('text-anchor','middle');t2.setAttribute('font-size','5');
    t2.setAttribute('font-family','monospace');t2.setAttribute('fill','#aaa');
    t2.textContent=c;svg.appendChild(t2);
  }

  const lAx=12*STEP+AISLE/2, rAx=12*STEP+AISLE+12*STEP+AISLE/2;
  ROWS.forEach((r,ri)=>{
    const y=rowY(ri);
    const cfg=ROW_CFG[r];
    const unavCols=UNAVAIL[r]||[];
    [lAx,rAx].forEach(lx=>{
      const lbl=document.createElementNS(ns,'text');
      lbl.setAttribute('x',lx);lbl.setAttribute('y',y+S/2+2);
      lbl.setAttribute('text-anchor','middle');lbl.setAttribute('font-size','6');
      lbl.setAttribute('font-family','monospace');lbl.setAttribute('fill','#bbb');
      lbl.textContent=r;svg.appendChild(lbl);
    });
    for(let c=1;c<=36;c++){
      const inL=cfg.left&&c>=cfg.left[0]&&c<=cfg.left[1];
      const inR=cfg.right&&c>=cfg.right[0]&&c<=cfg.right[1];
      const inC=c>=13&&c<=24;
      if(!inL&&!inR&&!inC) continue;
      const x=colToX(c);
      const isUnavail=unavCols.includes(c);
      const isTarget=r===TR&&c===TC;
      const isSel2=!isUnavail&&cfg.sel.includes(c);
      const isWC=cfg.wc&&inL;
      let fill;
      if(isTarget) fill='#8C2D3F';
      else if(isWC) fill='#dce8f0';
      else if(isUnavail) fill='#c8c4c0';
      else if(isSel2) fill='#3a8c5c';
      else fill='#dedad5';
      const rect=document.createElementNS(ns,'rect');
      rect.setAttribute('x',x);rect.setAttribute('y',y);rect.setAttribute('width',S);rect.setAttribute('height',S);
      rect.setAttribute('rx','0.8');rect.setAttribute('fill',fill);svg.appendChild(rect);
      if(isUnavail&&!isTarget){
        const h=document.createElementNS(ns,'rect');
        h.setAttribute('x',x);h.setAttribute('y',y);h.setAttribute('width',S);h.setAttribute('height',S);
        h.setAttribute('rx','0.8');h.setAttribute('fill',`url(#h-${wrapperId})`);svg.appendChild(h);
      }
      if(isTarget){
        const o=document.createElementNS(ns,'rect');
        o.setAttribute('x',x-1.5);o.setAttribute('y',y-1.5);o.setAttribute('width',S+3);o.setAttribute('height',S+3);
        o.setAttribute('rx','1.5');o.setAttribute('fill','none');
        o.setAttribute('stroke','#5a1a28');o.setAttribute('stroke-width','1.5');svg.appendChild(o);
      }
    }
  });

  // 全体フィット表示（ズーム・ドラッグなし）
  const ww=wrap.clientWidth,wh=wrap.clientHeight;
  const scale=Math.min(ww/totalW,wh/totalH)*0.95;
  const tx=(ww-totalW*scale)/2,ty=(wh-totalH*scale)/2;
  svg.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  wrap.style.cursor='default';
}

document.getElementById('email-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') loginByEmail();
});
</script>
