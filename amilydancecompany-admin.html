<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>受付管理 — Amily Summer Showcase 2026</title>
<link rel="icon" href="amily-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f9f7f4;--ink:#1a1a1a;--mid:#666;--border:#e0ddd8;
  --rose:#6b3fa0;--green:#2d7a4f;--green-l:#edf7f1;
  --red:#c0435a;--red-l:#fdf0f2;
  --warn:#b86a00;--warn-l:#fff8ee;
}
body{background:var(--bg);font-family:'Noto Sans JP',sans-serif;color:var(--ink);min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 48px;}

.hdr{text-align:center;margin-bottom:24px;}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:.05em;}
.hdr-sub{font-size:11px;color:var(--mid);margin-top:3px;}

/* ログイン */
.card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:24px 20px;margin-bottom:16px;}
.card-h{font-size:14px;font-weight:700;margin-bottom:14px;}
.field-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;outline:none;transition:border .15s;}
.field-input:focus{border-color:var(--rose);}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px;}
.btn-rose{background:var(--rose);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-warn{background:var(--warn);color:#fff;}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--mid);}
.btn:disabled{opacity:.45;cursor:default;}
.err-msg{font-size:12px;color:var(--rose);margin-top:10px;text-align:center;display:none;}

/* スキャン */
.scan-area{background:#000;border-radius:14px;overflow:hidden;position:relative;aspect-ratio:1;margin-bottom:14px;}
#qr-video{width:100%;height:100%;object-fit:cover;display:block;}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.scan-frame{width:60%;aspect-ratio:1;border:2px solid rgba(255,255,255,.7);border-radius:8px;box-shadow:0 0 0 1000px rgba(0,0,0,.4);}
.scan-status{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,.7);letter-spacing:.08em;}

/* 結果 */
.result-card{border-radius:14px;padding:20px;margin-bottom:12px;}
.result-ok{background:var(--green-l);border:2px solid var(--green);}
.result-warn{background:var(--warn-l);border:2px solid var(--warn);}
.result-err{background:var(--red-l);border:2px solid var(--red);}
.result-already{background:#f0f0f0;border:2px solid #999;}
.result-icon{font-size:36px;text-align:center;margin-bottom:8px;}
.result-msg{font-size:16px;font-weight:700;text-align:center;margin-bottom:14px;}
.result-ok .result-msg{color:var(--green);}
.result-warn .result-msg{color:var(--warn);}
.result-err .result-msg{color:var(--red);}
.result-already .result-msg{color:#555;}
.result-row{display:flex;gap:8px;margin-bottom:6px;font-size:13px;}
.result-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--mid);min-width:64px;padding-top:2px;flex-shrink:0;}

.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
.scan-again-btn{width:100%;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-title">受付管理</div>
    <div class="hdr-sub">Amily Summer Showcase 2026</div>
  </div>

  <!-- ログイン -->
  <div id="view-login">
    <div class="card">
      <div class="card-h">管理者ログイン</div>
      <input class="field-input" id="pw-input" type="password" placeholder="パスワード">
      <button class="btn btn-rose" onclick="adminLogin()">ログイン</button>
      <div class="err-msg" id="login-err"></div>
    </div>
  </div>

  <!-- スキャン画面 -->
  <div id="view-scan" style="display:none;">
    <div class="scan-area">
      <video id="qr-video" autoplay playsinline muted></video>
      <div class="scan-overlay"><div class="scan-frame"></div></div>
      <div class="scan-status" id="scan-status">QRコードを枠内に合わせてください</div>
    </div>
    <div class="card" style="padding:14px 16px;">
      <div style="font-size:12px;color:var(--mid);margin-bottom:8px;">または番号を直接入力</div>
      <div style="display:flex;gap:8px;">
        <input class="field-input" id="manual-input" type="text" placeholder="01001" style="font-family:'DM Mono',monospace;" maxlength="5">
        <button class="btn btn-rose" style="width:auto;padding:0 18px;margin-top:0;" onclick="manualCheckin()">照合</button>
      </div>
    </div>
    <button class="btn btn-outline" onclick="adminLogout()" style="margin-top:4px;">ログアウト</button>
  </div>

  <!-- 結果画面 -->
  <div id="view-result" style="display:none;">
    <div id="result-card" class="result-card">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-msg" id="result-msg"></div>
      <div id="result-detail"></div>
      <hr class="divider">
      <div id="result-actions"></div>
    </div>
    <button class="scan-again-btn" onclick="resumeScan()">次のQRをスキャン</button>
  </div>
</div>

<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyFHFu1S9FpTu2nS4iFmjn2zZ1_33c1D_1SNj4UXkHbRxWMj38dly_vR7qvhEaVpC6Eow/exec';

let adminPw    = '';
let scanning   = false;
let videoStream = null;
let rafId      = null;

// ── ログイン ──
function adminLogin() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) return;
  adminPw = pw;
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-scan').style.display  = 'block';
  startCamera();
}

function adminLogout() {
  stopCamera();
  adminPw = '';
  document.getElementById('view-scan').style.display  = 'none';
  document.getElementById('view-result').style.display = 'none';
  document.getElementById('view-login').style.display = 'block';
  document.getElementById('pw-input').value = '';
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});
document.getElementById('manual-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') manualCheckin();
});

// ── カメラ ──
async function startCamera() {
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 1280 } }
    });
    const video = document.getElementById('qr-video');
    video.srcObject = videoStream;
    video.addEventListener('loadedmetadata', () => {
      video.play();
      scanning = true;
      scanLoop();
    });
  } catch(e) {
    document.getElementById('scan-status').textContent = 'カメラにアクセスできません';
  }
}

function stopCamera() {
  scanning = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
}

function scanLoop() {
  if (!scanning) return;
  const video = document.getElementById('qr-video');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    const canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' });
    if (code && code.data) {
      scanning = false;
      processQR(code.data);
      return;
    }
  }
  rafId = requestAnimationFrame(scanLoop);
}

// ── QR処理 ──
function processQR(data) {
  // URL形式から id= を抽出、または番号のみの場合はそのまま
  let ticketNo = data;
  try {
    const url = new URL(data);
    ticketNo = url.searchParams.get('id') || data;
  } catch(e) {}
  ticketNo = String(parseInt(ticketNo, 10)).padStart(5, '0');
  doCheckin(ticketNo);
}

function manualCheckin() {
  const val = document.getElementById('manual-input').value.trim();
  if (!val) return;
  const ticketNo = String(parseInt(val, 10)).padStart(5, '0');
  doCheckin(ticketNo);
}

// ── 入場処理 ──
function doCheckin(ticketNo, force = false) {
  document.getElementById('scan-status').textContent = '確認中...';
  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'checkin', pw: adminPw, ticketNo, force }),
  })
    .then(r => r.json())
    .then(res => showResult(res, ticketNo))
    .catch(() => showResult({ status:'error', message:'通信エラー' }, ticketNo));
}

// ── 支払い済みに更新 ──
function markPaid(ticketNo) {
  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'markPaidByTicketNo', pw: adminPw, ticketNo }),
  })
    .then(r => r.json())
    .then(res => {
      if (res.status === 'ok') {
        doCheckin(ticketNo); // 支払い済み後に再度入場処理
      } else {
        alert('エラー: ' + (res.message || '更新に失敗しました'));
      }
    })
    .catch(() => alert('通信エラー'));
}

// ── 結果表示 ──
function showResult(res, ticketNo) {
  stopCamera();
  document.getElementById('view-scan').style.display   = 'none';
  document.getElementById('view-result').style.display = 'block';

  const card    = document.getElementById('result-card');
  const icon    = document.getElementById('result-icon');
  const msg     = document.getElementById('result-msg');
  const detail  = document.getElementById('result-detail');
  const actions = document.getElementById('result-actions');

  const perfLabel = res.perf === '1st' ? '1st Stage 14:30開演' : res.perf === '2nd' ? '2nd Stage 18:00開演' : '—';

  card.className    = 'result-card';
  detail.innerHTML  = '';
  actions.innerHTML = '';

  function addDetail(lbl, val) {
    if (!val) return;
    detail.innerHTML += `<div class="result-row"><span class="result-lbl">${lbl}</span><span>${val}</span></div>`;
  }

  if (res.status === 'ok') {
    card.classList.add('result-ok');
    icon.textContent = '✅';
    msg.textContent  = '入場OK';
    addDetail('チケット', ticketNo);
    addDetail('公演', perfLabel);
    addDetail('座席', res.seats || '—');
    addDetail('氏名', res.name || '—');
    addDetail('入場時刻', res.checkinTime || '—');

  } else if (res.code === 'ALREADY_CHECKED') {
    card.classList.add('result-already');
    icon.textContent = '⚠️';
    msg.textContent  = '入場済み';
    addDetail('チケット', ticketNo);
    addDetail('公演', perfLabel);
    addDetail('座席', res.seats || '—');
    addDetail('氏名', res.name || '—');

  } else if (res.code === 'NOT_PAID') {
    card.classList.add('result-warn');
    icon.textContent = '💳';
    msg.textContent  = '未払い — 入場できません';
    addDetail('チケット', ticketNo);
    addDetail('公演', perfLabel);
    addDetail('座席', res.seats || '—');
    addDetail('氏名', res.name || '—');
    actions.innerHTML = `
      <button class="btn btn-warn" onclick="markPaid('${ticketNo}')">支払い済みにして入場処理する</button>
    `;

  } else {
    card.classList.add('result-err');
    icon.textContent = '❌';
    msg.textContent  = res.message || 'エラーが発生しました';
    addDetail('チケット', ticketNo);
  }
}

function resumeScan() {
  document.getElementById('view-result').style.display = 'none';
  document.getElementById('view-scan').style.display   = 'block';
  document.getElementById('manual-input').value = '';
  document.getElementById('scan-status').textContent = 'QRコードを枠内に合わせてください';
  scanning = true;
  if (videoStream) {
    scanLoop();
  } else {
    startCamera();
  }
}
</script>
</body>
</html>
